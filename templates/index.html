<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ticket Authenticator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 overflow-hidden">
        <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Ticket Scanner</h1>
        <p class="text-sm text-gray-500 mb-6 text-center">Scan or upload a QR code.</p>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Target Journey Date</label>
            <input type="date" id="targetDate" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
        </div>

        <div id="reader" class="w-full rounded-lg overflow-hidden border-2 border-dashed border-gray-300 mb-4 bg-black"></div>

        <div class="mb-4 text-center" id="uploadContainer">
            <p class="text-sm text-gray-500 mb-2">- OR -</p>
            <label class="cursor-pointer bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 font-semibold py-2 px-4 rounded-lg w-full block transition-colors">
                Upload Ticket Image
                <input type="file" id="qr-input-file" accept="image/*" class="hidden">
            </label>
        </div>

        <div id="resultBox" class="hidden p-4 rounded-lg mt-4 transition-all">
            <h3 class="font-bold text-lg mb-1" id="statusTitle"></h3>
            <p class="text-sm" id="statusReason"></p>
            <button onclick="resetScanner()" class="mt-4 w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition-colors">Scan Another</button>
        </div>
    </div>

    <script>
        let html5QrcodeScanner;
        const html5QrCode = new Html5Qrcode("reader");

        function startScanner() {
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('reader').style.display = 'block';
            document.getElementById('uploadContainer').style.display = 'block';

            // Start live camera
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        // Handle File Uploads
        document.getElementById('qr-input-file').addEventListener('change', e => {
            if (e.target.files.length == 0) return;
            
            const targetDate = document.getElementById('targetDate').value;
            if (!targetDate) {
                alert("Please select a target journey date first!");
                e.target.value = ''; // Reset input
                return;
            }

            const imageFile = e.target.files[0];
            
            // Show loading state immediately
            showLoadingState();

            // Tell the library to scan the static file
            html5QrCode.scanFile(imageFile, true)
                .then(decodedText => {
                    // It found a QR code in the image!
                    sendToBackend(decodedText, targetDate);
                })
                .catch(err => {
                    // It failed to find a QR code
                    document.getElementById('resultBox').classList.remove('bg-blue-50');
                    document.getElementById('resultBox').classList.add('bg-red-100', 'text-red-800');
                    document.getElementById('statusTitle').innerText = "⚠️ Could not read image";
                    document.getElementById('statusReason').innerText = "Please crop the image so the QR code is larger, or try a clearer picture.";
                });
                
            e.target.value = ''; // Reset input so you can upload the same file again if needed
        });

        function onScanSuccess(decodedText) {
            const targetDate = document.getElementById('targetDate').value;
            if (!targetDate) {
                alert("Please select a target journey date first!");
                return;
            }
            showLoadingState();
            sendToBackend(decodedText, targetDate);
        }

        function showLoadingState() {
            // Stop scanning
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
            document.getElementById('reader').style.display = 'none';
            document.getElementById('uploadContainer').style.display = 'none';
            
            const resultBox = document.getElementById('resultBox');
            resultBox.classList.remove('hidden', 'bg-green-100', 'bg-red-100');
            resultBox.classList.add('bg-blue-50');
            document.getElementById('statusTitle').innerText = "Analyzing with AI...";
            document.getElementById('statusReason').innerText = "Please wait.";
        }

        async function sendToBackend(decodedText, targetDate) {
            try {
                const response = await fetch('/api/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        qr_text: decodedText,
                        target_date: targetDate
                    })
                });

                const data = await response.json();
                
                const resultBox = document.getElementById('resultBox');
                resultBox.classList.remove('bg-blue-50');
                if (data.is_valid) {
                    resultBox.classList.add('bg-green-100', 'text-green-800');
                    document.getElementById('statusTitle').innerText = "✅ Valid Ticket";
                } else {
                    resultBox.classList.add('bg-red-100', 'text-red-800');
                    document.getElementById('statusTitle').innerText = "❌ Invalid Ticket";
                }
                document.getElementById('statusReason').innerText = data.reason;

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('statusTitle').innerText = "⚠️ Error connecting to server";
            }
        }

        function onScanFailure(error) {
            // Ignore background camera errors
        }

        function resetScanner() {
            startScanner();
        }

        window.onload = startScanner;
    </script>
</body>
</html>
